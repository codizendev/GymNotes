name: Release Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.6"
          channel: stable
          cache: true

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          KEYSTORE_PATH="android/upload-keystore.jks"

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_STORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ]; then
            echo "Using signing config from GitHub Secrets."
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          else
            echo "Secrets missing. Generating temporary CI keystore."
            CI_STORE_PASSWORD="ci_build_password"
            CI_KEY_PASSWORD="ci_build_password"
            CI_KEY_ALIAS="ci-upload"
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_PATH" \
              -alias "$CI_KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$CI_STORE_PASSWORD" \
              -keypass "$CI_KEY_PASSWORD" \
              -dname "CN=GymNotes CI, OU=CI, O=GymNotes, L=Zagreb, ST=Zagreb, C=HR"
            ANDROID_STORE_PASSWORD="$CI_STORE_PASSWORD"
            ANDROID_KEY_PASSWORD="$CI_KEY_PASSWORD"
            ANDROID_KEY_ALIAS="$CI_KEY_ALIAS"
          fi

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Force Gradle Java home to runner JDK
        shell: bash
        run: |
          sed -i '/^org\.gradle\.java\.home=/d' android/gradle.properties
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          echo "Using org.gradle.java.home=$JAVA_HOME"

      - name: Build release APK
        run: flutter build apk --release

      - name: Verify APK output
        run: ls -la build/app/outputs/flutter-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: Automated APK build for `${{ github.ref_name }}`.
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
