name: flutter_application_1
description: "GymNotes - offline workout tracker for strength and cardio."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^17.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.1.1
  file_picker: ^10.3.3
  share_plus: ^12.0.0
  file_saver: ^0.3.1
  file_selector: ^1.0.4
  file_selector_android: ^0.5.2+1
  file_selector_ios: ^0.5.3+3
  file_selector_windows: ^0.9.3+4
  file_selector_macos: ^0.9.4+5
  file_selector_linux: ^0.9.3+2
  path_provider: ^2.1.5
  path_provider_foundation: ^2.4.0
  path_provider_windows: ^2.2.1
  path_provider_linux: ^2.2.1
  flutter_foreground_task: ^6.1.2
  package_info_plus: ^8.0.3


  # Za generiranje/printanje PDF-a i crtanje tablica
  pdf: ^3.11.1
  printing: ^5.14.2

  # Za formatiranje datuma u export_service.dart
  intl: ^0.20.2
  permission_handler: ^12.0.1
  audioplayers: ^6.1.0
  timezone: ^0.9.4

dev_dependencies:
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/beep.wav
    - assets/sounds/beep_long.wav
